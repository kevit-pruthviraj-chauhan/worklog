name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      - name: Build binary
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o worklog-${{ matrix.os }}-${{ matrix.arch }} ./cmd
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: worklog-${{ matrix.os }}-${{ matrix.arch }}
          path: worklog-${{ matrix.os }}-${{ matrix.arch }}

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      
      - name: Flatten artifacts
        run: |
          mkdir -p ./binaries
          find ./artifacts -type f -exec cp {} ./binaries/ \;
          ls -la ./binaries/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./binaries/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
